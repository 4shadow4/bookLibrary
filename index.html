<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Library</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="container">

        <h1>Library</h1>
        <button id="addBook">Add Book</button>
        <div id="library">

        </div>

        <div id="formContainer">
            <form id="formBook">
                <h1>Add Book</h1>

                <p>
                    <label for="name">Book Name</label>
                    <input type="text" name="name" id="name" required>
                </p>
                <p>
                    <label for="author">Book Author</label>
                    <input type="text" name="author" id="author" required>
                </p>
                <p>
                    <label for="pages">Pages</label>
                    <input type="number" name="pages" id="pages" min="0" required>
                </p>
                <p>
                    <label for="status">Status</label>
                    <select name="status" id="status" required>
                        <option value="true">read</option>
                        <option value="false">not read</option>
                    </select>
                </p>
                <p>
                    <label for="img">Image</label>
                    <input type="file" name="img" id="img" accept=".png,.jpg">
                </p>
            
                <button type="submit" id="submit">Add Book to Library</button>
                
            </form>
        </div>
        <div id="info">
            <div>
                <button id="closeInfo"></button>
                <img src="" alt="Picture of Book" id="infoImg">
                <h3 id="infoTitle"></h3>
                <p id="infoAuthor"></p>
                <p id="infoPages"></p>
                <div>
                    <p id="infoStatus"></p>
                    <button id="changeStatus">change Status</button>
                </div>
                <button id="deleteBook">Remove Book</button>
            </div>
        </div>

    </div>

    <script src="./script.js"></script>
</body>
</html>
